# Codicil FFI Bindings
# Provides web framework bindings for Brief code

[[functions]]
name = "json_parse"
location = "codicil::json_parse"
target = "native"
mapper = "rust"
description = "Parse JSON string to JsonValue"

[functions.input]
s = "String"

[functions.output.success]
result = "Data"

[functions.output.error]
type = "JsonError"
code = "Int"
message = "String"


[[functions]]
name = "json_stringify"
location = "codicil::json_stringify"
target = "native"
mapper = "rust"
description = "Convert value to JSON string"

[functions.input]
data = "Data"

[functions.output.success]
result = "String"

[functions.output.error]
type = "JsonError"
code = "Int"
message = "String"


